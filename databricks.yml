# This is a Databricks asset bundle definition for medical_desert_planner.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: medical_desert_planner
  uuid: c3e768a9-052a-4c24-9b78-1b012a7e749e

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-c5bb8304-1213.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-c5bb8304-1213.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/moganakumaran@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/moganakumaran@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: moganakumaran@gmail.com
        level: CAN_MANAGE
