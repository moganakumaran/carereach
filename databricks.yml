# This is a Databricks asset bundle definition for medical_desert_planner.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: medical_desert_planner
  uuid: c3e768a9-052a-4c24-9b78-1b012a7e749e

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # NOTE: 'mode: development' is intentionally omitted. Development mode prefixes
    # Unity Catalog schema names with 'dev_<user>_', but the app/agents/Genie all
    # reference fixed names (mdp.bronze, mdp.silver, mdp.gold, mdp.ops). dev and
    # prod deliberately share the single stable 'mdp' catalog so the app built in
    # dev works unchanged in prod — so we deploy exact names in both targets.
    default: true
    workspace:
      host: https://dbc-d2cc8242-7697.cloud.databricks.com
    variables:
      catalog: mdp
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-d2cc8242-7697.cloud.databricks.com
      # Deploy under the current user's workspace home so there's a single copy.
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: mdp
      schema: prod
    permissions:
      - user_name: mohan.trades.1412@gmail.com
        level: CAN_MANAGE
