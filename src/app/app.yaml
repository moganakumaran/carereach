# Databricks Apps spec. Streamlit serves on the app's assigned port.
command: ["streamlit", "run", "app.py", "--server.port", "8000", "--server.address", "0.0.0.0", "--server.headless", "true"]

env:
  - name: MDP_WAREHOUSE_ID
    valueFrom: sql_warehouse
  - name: MDP_SUPERVISOR_ENDPOINT
    valueFrom: supervisor
  - name: MDP_PG_INSTANCE
    value: mdp-pg
  - name: MDP_PG_DATABASE
    value: mdp_app
  # Deterministic fallback for the live Lakebase endpoint: the binding's injected PGHOST can go
  # stale after the instance is recreated (same name, new DNS). Update if the instance is recreated.
  - name: MDP_PG_HOST
    value: ep-winter-pine-d8f8a9ty.database.us-east-2.cloud.databricks.com
