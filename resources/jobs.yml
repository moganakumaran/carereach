# Bronze ingest job: lands the three Virtue Foundation source tables into mdp.bronze
# as Delta, then asserts the Checkpoint-3 invariants. Every task is idempotent
# (CREATE OR REPLACE), so re-running the job yields identical row counts.
#
# Run with:  databricks bundle run bronze_ingest -t dev
resources:
  jobs:
    bronze_ingest:
      name: mdp_bronze_ingest
      tasks:
        - task_key: ingest_facilities
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ../src/pipelines/bronze/facilities.sql
        - task_key: ingest_pincode
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ../src/pipelines/bronze/pincode.sql
        - task_key: ingest_nfhs5
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ../src/pipelines/bronze/nfhs5.sql
        - task_key: assert_bronze
          depends_on:
            - task_key: ingest_facilities
            - task_key: ingest_pincode
            - task_key: ingest_nfhs5
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ../tests/bronze_assertions.sql
      queue:
        enabled: true

    # Silver transform: clean enrichment + AI extraction + spatial district assignment.
    # NFHS clean, pincode dedup and boundary ingest run in parallel; facility build waits on
    # claims extraction + boundaries + pincode. Idempotent. Run: databricks bundle run silver_transform -t dev
    # NOTE: extract_claims runs ~10k ai_query (gemini-3-5-flash) calls (~45 min on a 2X-Small warehouse).
    silver_transform:
      name: mdp_silver_transform
      tasks:
        - task_key: clean_nfhs5
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: {path: ../src/pipelines/silver/nfhs5_clean.sql}
        - task_key: dedup_pincode
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: {path: ../src/pipelines/silver/pincode_dedup.sql}
        - task_key: ingest_boundaries
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: {path: ../src/pipelines/bronze/district_boundaries.sql}
        - task_key: clean_boundaries
          depends_on: [{task_key: ingest_boundaries}]
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: {path: ../src/pipelines/silver/district_boundaries.sql}
        - task_key: extract_claims
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: {path: ../src/pipelines/silver/facility_claims.sql}
        - task_key: build_facility
          depends_on: [{task_key: extract_claims}, {task_key: clean_boundaries}, {task_key: dedup_pincode}]
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: {path: ../src/pipelines/silver/facility.sql}
        - task_key: build_facility_search
          depends_on: [{task_key: build_facility}]
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: {path: ../src/pipelines/silver/facility_search.sql}
        - task_key: assert_silver
          depends_on: [{task_key: build_facility_search}, {task_key: clean_nfhs5}]
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: {path: ../tests/silver_assertions.sql}
      queue:
        enabled: true

    # Gold build: decision-ready facility + district_desert tables, then DQ assertions.
    # Run: databricks bundle run gold_build -t dev   (depends on silver tables existing)
    gold_build:
      name: mdp_gold_build
      tasks:
        - task_key: build_gold_facility
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: {path: ../src/pipelines/gold/facility.sql}
        - task_key: build_district_desert
          depends_on: [{task_key: build_gold_facility}]
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: {path: ../src/pipelines/gold/district_desert.sql}
        - task_key: build_district_map
          depends_on: [{task_key: build_district_desert}]
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: {path: ../src/pipelines/gold/district_map.sql}
        - task_key: assert_gold
          depends_on: [{task_key: build_district_map}]
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file: {path: ../tests/gold_assertions.sql}
      queue:
        enabled: true
