# Databricks App (hosted) for the CareReach UI.
# Source in src/app/ (app.py + app.yaml + requirements.txt). Resource bindings grant the app's
# service principal access to the SQL warehouse, supervisor endpoint, and Lakebase, and inject
# their identifiers as env vars (referenced via valueFrom in app.yaml).
resources:
  apps:
    mdp_app:
      name: mdp-planner
      description: "CareReach — find real maternal-care deserts (gap x data-confidence), evidence, and scenario save."
      source_code_path: ../src/app
      resources:
        - name: sql_warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: supervisor
          serving_endpoint:
            name: mas-e40dbc0b-endpoint
            permission: CAN_QUERY
        # Lakebase binding: federates the app SP for OAuth login to mdp-pg (a plain CREATE ROLE
        # is not enough — this grant is what makes the SP's token accepted). The SP role must
        # already exist (see src/db/grant_app_sp.sql), else this fails with "role not found".
        - name: lakebase
          database:
            instance_name: mdp-pg
            database_name: mdp_app
            permission: CAN_CONNECT_AND_CREATE
