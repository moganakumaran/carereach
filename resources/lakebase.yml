# Lakebase (serverless Postgres) for planner state & persistence.
# The app connects to the instance directly (Postgres) via its `database` resource binding,
# so only the instance is required here. App tables (sessions/scenarios/evidence_trail/
# reviewer_overrides) are created by src/db/schema.sql; the app SP is provisioned as a
# Postgres role via src/db/grant_app_sp.sql.
# (The optional database_catalog that registered mdp_app in UC was dropped — it was unused by
#  the app and complicated deploys; re-add it if UC governance over the Postgres DB is needed.)
resources:
  database_instances:
    mdp_pg:
      name: mdp-pg
      capacity: CU_1          # smallest Lakebase SKU
